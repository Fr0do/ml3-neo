project:
  type: website
  output-dir: _site
  preview:
    port: 4848
    browser: false
  render:
    - "index.qmd"
    - "syllabus.qmd"
    - "how-to-study.qmd"
    - "leaderboards.qmd"
    - "lectures/**/*.qmd"
    - "homework/**/README.qmd"
    - "!lectures/_template/**"
    - "!homework/_template/**"
  resources:
    - figures/tikz/_build/**/*.svg

website:
  title: "ML3 Neo"
  description: "Курс машинного обучения для магистратур по data science"
  site-url: https://fr0do.github.io/ml3-neo
  repo-url: https://github.com/Fr0do/ml3-neo
  repo-actions: [edit, source, issue]
  page-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: dark
    pinned: true
    left:
      - href: index.qmd
        text: Главная
      - href: syllabus.qmd
        text: Программа
      - href: how-to-study.qmd
        text: Как учиться
      - text: Лекции
        menu:
          - text: "01 — Backprop & Autograd"
            href: lectures/01-backprop/lecture.html
          - text: "02 — PyTorch Fundamentals"
            href: lectures/02-pytorch/lecture.html
          - text: "03 — MLP & Normalization"
            href: lectures/03-mlp-norm/lecture.html
          - text: "04 — CNNs"
            href: lectures/04-cnn/lecture.html
          - text: "05 — Sequence Models"
            href: lectures/05-sequence/lecture.html
          - text: "06 — Transformer"
            href: lectures/06-transformer/lecture.html
          - text: "07 — Pre-training & Fine-tuning"
            href: lectures/07-pretrain/lecture.html
          - text: "08 — Generative Intro"
            href: lectures/08-generative/lecture.html
          - text: "---"
          - text: "Track: CV Detection"
            href: lectures/tracks/cv-detection/lecture.html
          - text: "Track: NLP & LLMs"
            href: lectures/tracks/nlp-llm/lecture.html
          - text: "Track: Efficient ML"
            href: lectures/tracks/efficient/lecture.html
          - text: "Track: Generative (deep)"
            href: lectures/tracks/generative/lecture.html
          - text: "Track: Graphs & KAN"
            href: lectures/tracks/graphs/lecture.html
          - text: "Track: RL"
            href: lectures/tracks/rl/lecture.html
      - text: Домашки
        menu:
          - homework/01-backprop/README.qmd
          - homework/02-pytorch/README.qmd
          - homework/03-mlp-norm/README.qmd
          - homework/04-cnn-zoo/README.qmd
          - homework/05-sequence/README.qmd
          - homework/06-transformer/README.qmd
          - homework/07-pretrain/README.qmd
          - homework/08-generative/README.qmd
      - href: leaderboards.qmd
        text: Leaderboards
    right:
      - icon: github
        href: https://github.com/Fr0do/ml3-neo
        aria-label: GitHub
  sidebar:
    - id: course
      title: "Содержание"
      style: docked
      collapse-level: 2
      contents:
        - section: "Core"
          contents:
            - lectures/01-backprop/lecture.qmd
            - lectures/02-pytorch/lecture.qmd
            - lectures/03-mlp-norm/lecture.qmd
            - lectures/04-cnn/lecture.qmd
            - lectures/05-sequence/lecture.qmd
            - lectures/06-transformer/lecture.qmd
            - lectures/07-pretrain/lecture.qmd
            - lectures/08-generative/lecture.qmd
        - section: "Optional Tracks"
          contents:
            - lectures/tracks/cv-detection/lecture.qmd
            - lectures/tracks/nlp-llm/lecture.qmd
            - lectures/tracks/efficient/lecture.qmd
            - lectures/tracks/generative/lecture.qmd
            - lectures/tracks/graphs/lecture.qmd
            - lectures/tracks/rl/lecture.qmd
  page-footer:
    left: "© 2026 ml3-neo · CC-BY-SA"
    right: "Сделано с Quarto + Marimo"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: false
    code-tools: true
    code-copy: true
    code-link: true
    highlight-style: github
    fig-align: center
    fig-format: svg
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    html-math-method: katex
    css: theme.css
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://cdn.jsdelivr.net">
# PDF-сборка лекций — опциональная, не через Quarto-сайт.
# Отдельные .tex + Tectonic живут в figures/ и собираются командой
# `pixi run tikz-all`. Если нужен PDF-конспект лекции — запустите
# `quarto render lectures/<id>/lecture.qmd --to pdf` руками; требуется
# актуальный TeXLive с доступом к tlmgr.

execute:
  freeze: auto
  cache: true

bibliography: refs.bib
csl: https://www.zotero.org/styles/ieee
lang: ru
