rubric:
  total: 50

  criteria:
    - id: ablation_quality
      label: "Качество Ablation Study"
      weight: 20
      description: |
        Чистые ablations, изоляция одного фактора за раз (например, меняется только нормализация при фиксированных остальных гиперпараметрах), зафиксированный seed, статистическая значимость.
      anchors:
        20: "Абсолютно чистые эксперименты с изоляцией факторов и таблицей результатов."
        10: "Эксперименты есть, но факторы смешиваются."
        0: "Нет сравнения."

    - id: normalization_insight
      label: "Инсайт про нормализации"
      weight: 15
      description: |
        Студент объясняет ПОЧЕМУ один метод лучше в его инстансе.
      anchors:
        15: "Глубокое объяснение, связанное с размером батча, распределением фичей или архитектурой."
        7: "Поверхностное объяснение (просто 'скор выше')."
        0: "Нет объяснений."

    - id: code_quality
      label: "Качество кода"
      weight: 10
      description: |
        Реализации норм с нуля, а не просто вызовы nn.BatchNorm.
      anchors:
        10: "Чистый код, кастомные модули нормализации."
        5: "Использование стандартных nn.* без своих реализаций."
        0: "Код не запускается."

    - id: writeup
      label: "Writeup (MODEL.md)"
      weight: 5
      description: |
        MODEL.md структурирован, есть чёткий вывод.
      anchors:
        5: "Отлично структурирован."
        0: "Отсутствует."

  red_flags:
    - "no_ablation_performed"
    - "copy_pasted_without_understanding"
    - "hardcoded_predictions"

  output_format: |
    Верни строго JSON следующего вида:
    {
      "scores": { "<criterion_id>": <number>, ... },
      "comments": { "<criterion_id>": "<краткое объяснение оценки>", ... },
      "red_flags_triggered": ["..."],
      "total": <number from 0 to 50>
    }
