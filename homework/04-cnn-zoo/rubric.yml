# Открытый rubric для judge-режима ДЗ 04-cnn-zoo.
# Этот файл — единственный источник истины для LLM-судьи. Никаких скрытых
# критериев. Студенты могут читать и оптимизировать MODEL.md под него.

rubric:
  total: 40   # должно совпадать с meta.yml.judge.weight

  criteria:
    - id: problem_framing
      label: "Постановка задачи"
      weight: 5
      description: |
        Студент чётко формулирует, какую задачу он решает, на каком сете,
        с какой метрикой, и какой baseline он берёт за отправную точку.
      anchors:
        5: "Постановка задачи и baseline формулируются явно с числами."
        3: "Постановка есть, baseline размыт."
        0: "Не понятно, что и зачем сравнивается."

    - id: experimental_design
      label: "Дизайн экспериментов"
      weight: 12
      description: |
        Эксперименты изолируют один фактор за раз (ablations), используют
        фиксированный seed, имеют разумный объём прогонов. Кросс-зависимости
        между гиперпараметрами осознаны.
      anchors:
        12: "Минимум 3 чистые ablations с фиксированным seed и таблицей."
        8:  "Есть ablations, но смешано несколько факторов в одном прогоне."
        4:  "Один прогон без сравнения."
        0:  "Эксперименты отсутствуют или невоспроизводимы."

    - id: architecture_justification
      label: "Обоснование архитектуры"
      weight: 10
      description: |
        Выбор сети, нормализации, аугментаций, регуляризации обоснован
        ссылкой на свойства данных и/или результаты ablations, а не «потому
        что в paper'е написали».
      anchors:
        10: "Каждое решение мотивировано экспериментом или свойством данных."
        6:  "Часть решений мотивирована, часть — по умолчанию."
        2:  "Скопирован чужой setup без объяснений."
        0:  "Никаких объяснений нет."

    - id: failure_analysis
      label: "Что не сработало"
      weight: 5
      description: |
        В MODEL.md есть честный раздел «что пробовали и почему отказались».
        Это очень ценный сигнал зрелости.
      anchors:
        5: "Минимум 3 отброшенных идеи с разбором причин."
        3: "Один-два пункта без разбора."
        0: "Раздел отсутствует."

    - id: creativity
      label: "Креатив / нестандартный ход"
      weight: 5
      description: |
        Что-то нетипичное: своя аугментация, необычная архитектура,
        неожиданная инициализация, гибрид методов. Не путать с
        бессмысленным усложнением.
      anchors:
        5: "Есть оригинальная идея, проверенная экспериментом."
        3: "Идея есть, но проверки нет."
        0: "Стандартный шаблон без своих штрихов."

    - id: code_quality
      label: "Качество кода и воспроизводимость"
      weight: 3
      description: |
        Marimo notebook запускается чисто, ячейки изолированы, нет
        захардкоженных путей, seed зафиксирован.
      anchors:
        3: "Запускается на свежем pixi-окружении за один проход."
        2: "Запускается с минимальными правками."
        0: "Не запускается или требует ручных хаков."

  red_flags:
    # Если найдено — judge-балл умножается на 0.
    - "Тренировка на тестовом сете."
    - "Захардкоженные predictions без модели."
    - "MODEL.md полностью сгенерирован LLM без следов своих экспериментов."

  output_format: |
    Верни строго JSON следующего вида:
    {
      "scores": { "<criterion_id>": <number>, ... },
      "comments": { "<criterion_id>": "<краткое объяснение оценки>", ... },
      "red_flags_triggered": ["..."],
      "total": <number from 0 to 40>
    }
