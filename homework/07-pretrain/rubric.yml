# Открытый rubric для judge-режима ДЗ 07-pretrain.

rubric:
  total: 100

  criteria:
    - id: lora_implementation
      label: "Реализация и корректность LoRA"
      weight: 20
      description: |
        LoRA применён корректно. Правильно определены target_modules. Студент подсчитал и вывел количество обучаемых параметров (trainable vs total).
      anchors:
        20: "LoRA применен логично, параметры посчитаны и их доля < 5%."
        10: "LoRA применен, но параметры не посчитаны или доля подозрительно велика."
        0: "LoRA не применен или применен с грубыми ошибками."

    - id: rank_ablation
      label: "Ablation Study по рангу"
      weight: 25
      description: |
        Систематически проверены разные значения ранга (r). Результаты сведены в таблицу или график. Есть объяснение, почему увеличение ранга после определенного момента не дает прироста (или дает).
      anchors:
        25: "Проверено $\ge 3$ значений ранга, результаты наглядны, есть выводы."
        15: "Проверено несколько рангов, но выводы поверхностные."
        5: "Только один прогон, ablation отсутствует."
        0: "Вообще нет экспериментов с гиперпараметрами."

    - id: baseline_comparison
      label: "Сравнение с baseline"
      weight: 20
      description: |
        Модель с LoRA сравнивается с head-only дообучением или full fine-tuning (если модель позволяет).
      anchors:
        20: "Сравнение проведено, разница в качестве и времени аргументирована."
        10: "Есть базовое сравнение, но без деталей."
        0: "Нет сравнения с другими методами."

    - id: efficiency_analysis
      label: "Анализ эффективности"
      weight: 20
      description: |
        Показан tradeoff: количество параметров vs качество (accuracy/loss) и время обучения vs качество.
      anchors:
        20: "Tradeoff проанализирован с числами."
        10: "Tradeoff упомянут вскользь."
        0: "Нет упоминаний эффективности."

    - id: writeup
      label: "Оформление MODEL.md"
      weight: 15
      description: |
        MODEL.md содержит конкретные числа, выводы ясны, текст хорошо структурирован.
      anchors:
        15: "Отличный структурированный текст с числами."
        5: "Текст есть, но вода, чисел мало."
        0: "Отчет отсутствует или скопирован из примера."

  red_flags:
    - "no_baseline_comparison"
    - "lora_rank_not_ablated"
