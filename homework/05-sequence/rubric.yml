rubric:
  total: 40

  criteria:
    - id: model_choice
      label: "Обоснование выбора архитектуры (RNN/LSTM/GRU)"
      weight: 15
      description: |
        В MODEL.md должно быть сравнение архитектур и обоснование финального выбора с помощью ablations (сравнение метрик, скорости сходимости).
      anchors:
        15: "Проведены эксперименты с RNN, LSTM, GRU. Выбор чётко аргументирован метриками."
        8: "Пробовали разные варианты, но обоснование слабое или нет таблицы сравнения."
        0: "Архитектура выбрана наугад без сравнений."

    - id: attention_analysis
      label: "Анализ механизма Attention"
      weight: 15
      description: |
        Реализован механизм Attention, показан его вклад в метрику (ablation), и визуализирована alignment matrix хотя бы для одного примера.
      anchors:
        15: "Attention реализован, улучшил F1 (есть пруф), матрица визуализирована и интерпретирована."
        8: "Attention реализован, но нет визуализации или нет доказательства его полезности."
        0: "Attention не используется или скопирован как черный ящик."

    - id: writeup
      label: "Качество MODEL.md"
      weight: 10
      description: |
        MODEL.md чётко объясняет, что было сделано, что улучшило метрику (F1), а что не сработало.
      anchors:
        10: "Ясный отчет, структурированный, перечислены успехи и провалы."
        5: "Отчет есть, но поверхностный."
        0: "Отчет отсутствует или состоит из воды."

  red_flags:
    - "Тренировка на тестовом сете."
    - "Использование предобученных LLM/Трансформеров (это тема следующего модуля)."
    - "Захардкоженные predictions."

  output_format: |
    Верни строго JSON:
    {
      "scores": { "<criterion_id>": <number>, ... },
      "comments": { "<criterion_id>": "<краткое объяснение оценки>", ... },
      "red_flags_triggered": ["..."],
      "total": <number>
    }
