# Открытый rubric для judge-режима ДЗ 01-backprop.
# Этот файл — единственный источник истины для LLM-судьи.

rubric:
  total: 100

  criteria:
    - id: correctness
      label: "Корректность autograd"
      weight: 40
      description: |
        Движок должен верно считать градиенты для базовых операций.
        Обязательно наличие численной проверки градиентов (numerical gradient check).
      anchors:
        40: "Все заявленные операции дифференцируются верно. Есть тесты с численной производной."
        25: "Движок работает, но нет тестов численной проверки или есть баг в сложных операциях (например, broadcast)."
        10: "Градиенты считаются только для узкого класса операций (нет градиента активаций, только линейные)."
        0:  "Градиенты считаются неверно, сеть не может обновить веса."

    - id: experiments
      label: "Обучение и эксперименты"
      weight: 25
      description: |
        Обучение MLP на выбранном датасете. Показаны кривые потерь (loss curves). 
        Сделаны ablations (сравнение learning rates, глубины, функций активации).
      anchors:
        25: "Модель успешно обучается (loss падает), представлены наглядные графики. Сделано минимум 2 ablation study."
        15: "Модель обучается, но нет графиков или только один ablation прогон."
        5:  "Код обучения есть, но модель не сходится."
        0:  "Эксперименты отсутствуют."

    - id: code_quality
      label: "Качество абстракций"
      weight: 20
      description: |
        Чистота реализации графа. Понятные абстракции для Module, Parameter, 
        и алгоритма топологической сортировки.
      anchors:
        20: "Абстракции чётко разделены (например, Value, Module, Optimizer). Код легко читать."
        10: "Всё написано 'в лоб', смешаны вычисления и обучение, но работает."
        0:  "Спагетти-код с хардкодом градиентов."

    - id: writeup
      label: "Обоснование в MODEL.md"
      weight: 15
      description: |
        MODEL.md объясняет ключевые решения: как работает backward, поддерживаются 
        ли тензоры/батчи, как выбирались параметры для MLP.
      anchors:
        15: "Отличное техническое описание с мотивацией выбора архитектуры движка и гиперпараметров."
        8:  "Краткое описание без глубокого анализа."
        0:  "Отчёт отсутствует или сгенерирован ИИ без фактуры."

  red_flags:
    # Если найдено — judge-балл умножается на 0.
    - "used_pytorch_autograd: Использован torch.autograd, JAX, micrograd."
    - "hardcoded_gradients: Градиенты захардкожены для конкретной сети без общего графа вычислений."

  output_format: |
    Верни строго JSON следующего вида:
    {
      "scores": { "<criterion_id>": <number>, ... },
      "comments": { "<criterion_id>": "<краткое объяснение оценки>", ... },
      "red_flags_triggered": ["..."],
      "total": <number from 0 to 100>
    }
